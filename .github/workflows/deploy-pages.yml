name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "quantum-lab/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build pages bundle
        run: |
          rm -rf pages-site
          mkdir -p pages-site
          cp -R pages/. pages-site/
          cp -R quantum-lab pages-site/
          cp -R fraud-shield pages-site/
          cp -R mining-material-mapper pages-site/
          cp -R nokia-snake pages-site/
          cp -R nourishco-prototype pages-site/
          cp -R supplier-app pages-site/
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
